name: VOO Alert Monitor

on:
  # schedule:
  #   - cron: '0 7 * * 1-5'   # 7am UTC = 9am CET (summer) / 8am CET (winter), weekdays only
  # NOTE: GitHub cron disabled — scheduling is now handled by Claude remote agent (trig_01Kib5ML6WLkLUNBrSfwaPxa)
  # which triggers this workflow via workflow_dispatch. See https://claude.ai/code/scheduled/trig_01Kib5ML6WLkLUNBrSfwaPxa
  workflow_dispatch:          # Triggered by Claude scheduled agent (weekdays 7am UTC)

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit state.json updates back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance anthropic requests python-dotenv

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u monitor.py

      - name: Commit state changes if peak updated
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update VOO peak state $(date +%Y-%m-%d)"
          git push
